{% extends "base.html" %}
{% block title %}Screenings | TW Stock AI{% endblock %}
{% block content %}
<section class="hero compact">
  <div>
    <p class="eyebrow">3-10 day screening</p>
    <h2>最新選股結果</h2>
    <p class="lede">系統只顯示由真實資料計算出的結果；若資料不足，會保留缺資料原因而不是自行補值。</p>
  </div>
  <button class="primary" onclick="runScreening()">重新計算</button>
</section>

<section class="panel">
  <div class="panel-head">
    <h3>最新 run</h3>
    <button onclick="loadLatest()">重新讀取</button>
  </div>
  <pre id="latest-run">載入中...</pre>
</section>

<script>
async function loadLatest() {
  const response = await fetch('/api/screenings/latest');
  const data = await response.json();
  document.getElementById('latest-run').textContent = JSON.stringify(data, null, 2);
}

async function runScreening() {
  const response = await fetch('/api/screenings/run', { method: 'POST' });
  const data = await response.json();
  document.getElementById('latest-run').textContent = JSON.stringify(data, null, 2);
}

loadLatest();
</script>
{% endblock %}
